services:
  postgres:
    image: postgres:18
    container_name: postgres

    restart: unless-stopped

    ports:
      - '${POSTGRES_PORT}:5432'

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      TZ: UTC
      PGTZ: UTC

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
